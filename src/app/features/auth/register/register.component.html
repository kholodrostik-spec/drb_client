<div class="register-page">
  <div class="register-card">
    <h1 class="title">Registration</h1>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="field">
        <label for="name">Name</label>
        <input id="name" type="text" [(ngModel)]="name"
               name="name" placeholder="Enter your name" required/>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password"
               name="password" placeholder="Enter password" required/>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword"
               name="confirmPassword" placeholder="Enter password again" required
               [class.error-input]="confirmPassword.length > 0 && !passwordsMatch"/>
        @if (confirmPassword.length > 0 && !passwordsMatch) {
          <span class="hint error">Passwords do not match</span>
        }
        @if (passwordsMatch) {
          <span class="hint success">Passwords match ✓</span>
        }
      </div>

      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="success-message">{{ successMessage }}</div>
      }

      <button type="submit" [disabled]="!formValid || isLoading" class="submit-btn">
        @if (!isLoading) { <span>Register</span> }
        @if (isLoading) { <span>Loading...</span> }
      </button>

    </form>
  </div>
</div>
